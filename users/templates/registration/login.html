{% load static %}
<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi – Gestionale Eventi Omar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'events/css/style.css' %}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="auth-logo">🗓</span>
                <div class="auth-app-name">Gestionale Eventi Omar</div>
                <div class="auth-app-tagline">Effettua il login</div>
            </div>
            <div class="auth-body">
                <h2>Accedi al tuo account</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn">Entra</button>
                </form>
                <div class="auth-links">
                    Non hai un account? <a href="{% url 'signup' %}">Registrati qui</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
