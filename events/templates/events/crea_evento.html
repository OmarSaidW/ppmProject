{% load static %}
<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Crea Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'events/css/style.css' %}">
</head>

<body>
    <div class="container">
        <h1>Nuovo Evento</h1>
        <hr>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small style="color: var(--text-secondary); display: block; margin-top: 4px;">{{ field.help_text
                    }}</small>
                {% endif %}
                {% for error in field.errors %}
                <span style="color: var(--color-danger); font-size: 0.85rem; display: block; margin-top: 4px;">{{ error
                    }}</span>
                {% endfor %}
            </div>
            {% endfor %}

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-success">Salva Evento</button>
                <a href="{% url 'lista_eventi' %}" class="btn btn-secondary">Annulla</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
